name: Generate NZPortable Nightlies.
on:
  schedule:
  - cron: 0 7 * * *
  workflow_dispatch:
  
jobs:
  Generate-Nightly:
    runs-on: ubuntu-latest
    container:
      image: sharkwouter/pspdev
    steps:
      - uses: actions/checkout@v4
      - name: Get apt ready
        run: |
          apt update
          apt install -y zip unzip wget curl git jq
      - name: Assemble Archives
        continue-on-error: false
        working-directory: ./
        run: |
          ./generate-nightly.sh ${{ secrets.GITHUB_TOKEN }}
      - name: Get Build Date
        id: date
        run: echo "::set-output name=date::$(cat release_version.txt)"
      - name: Delete Old Release
        uses: dev-drprasad/delete-tag-and-release@v0.2.1
        with:
          delete_release: true
          tag_name: nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Wait ...
        run: sleep 10
      - name: Release
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        id: attempt-1
        with:
          name: ${{ steps.date.outputs.date }}
          tag_name: nightly
          body_path: changes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./out/nzportable-nspire.zip
            ./out/nzportable-3ds.zip
            ./out/nzportable-linux32.zip
            ./out/nzportable-linux64.zip
            ./out/nzportable-linuxarm64.zip
            ./out/nzportable-linuxarmhf.zip
            ./out/nzportable-psp.zip
            ./out/nzportable-switch.zip
            ./out/nzportable-vita.zip
            ./out/nzportable-win32.zip
            ./out/nzportable-win64.zip
            ./out/build-version.txt
      - name: Release attempt 2
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        id: attempt-2
        if: steps.attempt-1.outcome == 'failure'
        with:
          name: ${{ steps.date.outputs.date }}
          tag_name: nightly
          body_path: changes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./out/nzportable-nspire.zip
            ./out/nzportable-3ds.zip
            ./out/nzportable-linux32.zip
            ./out/nzportable-linux64.zip
            ./out/nzportable-linuxarm64.zip
            ./out/nzportable-linuxarmhf.zip
            ./out/nzportable-psp.zip
            ./out/nzportable-switch.zip
            ./out/nzportable-vita.zip
            ./out/nzportable-win32.zip
            ./out/nzportable-win64.zip
            ./out/build-version.txt
      - name: Release attempt 3
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        id: attempt-3
        if: steps.attempt-2.outcome == 'failure'
        with:
          name: ${{ steps.date.outputs.date }}
          tag_name: nightly
          body_path: changes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./out/nzportable-nspire.zip
            ./out/nzportable-3ds.zip
            ./out/nzportable-linux32.zip
            ./out/nzportable-linux64.zip
            ./out/nzportable-linuxarm64.zip
            ./out/nzportable-linuxarmhf.zip
            ./out/nzportable-psp.zip
            ./out/nzportable-switch.zip
            ./out/nzportable-vita.zip
            ./out/nzportable-win32.zip
            ./out/nzportable-win64.zip
            ./out/build-version.txt
      - name: Release attempt 4
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        id: attempt-4
        if: steps.attempt-3.outcome == 'failure'
        with:
          name: ${{ steps.date.outputs.date }}
          tag_name: nightly
          body_path: changes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./out/nzportable-nspire.zip
            ./out/nzportable-3ds.zip
            ./out/nzportable-linux32.zip
            ./out/nzportable-linux64.zip
            ./out/nzportable-linuxarm64.zip
            ./out/nzportable-linuxarmhf.zip
            ./out/nzportable-psp.zip
            ./out/nzportable-switch.zip
            ./out/nzportable-vita.zip
            ./out/nzportable-win32.zip
            ./out/nzportable-win64.zip
            ./out/build-version.txt
      - name: Release attempt 5
        uses: softprops/action-gh-release@v1
        continue-on-error: false
        id: attempt-5
        if: steps.attempt-4.outcome == 'failure'
        with:
          name: ${{ steps.date.outputs.date }}
          tag_name: nightly
          body_path: changes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./out/nzportable-nspire.zip
            ./out/nzportable-3ds.zip
            ./out/nzportable-linux32.zip
            ./out/nzportable-linux64.zip
            ./out/nzportable-linuxarm64.zip
            ./out/nzportable-linuxarmhf.zip
            ./out/nzportable-psp.zip
            ./out/nzportable-switch.zip
            ./out/nzportable-vita.zip
            ./out/nzportable-win32.zip
            ./out/nzportable-win64.zip
            ./out/build-version.txt
  
  build-flatpak:
    name: Build Flatpak
    strategy:
      fail-fast: false
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    needs: Generate-Nightly
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Map CPU architecture to engine ZIP name
        id: archmap
        run: |
          case "${{ matrix.variant.arch }}" in
            x86_64)
              echo "archive_arch=linux64" >> $GITHUB_OUTPUT
              ;;
            aarch64)
              echo "archive_arch=arm64" >> $GITHUB_OUTPUT
              ;;
          esac
      - name: Download Flatpak dependencies + add Flathub remote
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08 || true
      - name: Run generate-flatpak.sh
        run: |
          ./generate-flatpak.sh "${{ matrix.variant.arch }}"
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: nzportable-${{ steps.archmap.outputs.archive_arch }}.flatpak
          manifest-path: gay.nzp.nzportable.json
          arch: ${{ matrix.variant.arch }}
          cache-key: flatpak-builder-${{ github.sha }}-${{ matrix.variant.arch }}
          verbose: true
      - name: Upload Flatpak to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          files: nzportable-${{ steps.archmap.outputs.archive_arch }}.flatpak
          token: ${{ secrets.GITHUB_TOKEN }}

  
